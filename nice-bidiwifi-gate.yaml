esphome:
  name: nice-gate
  friendly_name: "Nice Gate"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: https://github.com/ngem1/esphome-nice-bidiwifi
      ref: main  # pin a branch (e.g. cover-invert-num-fix) or use local: source: components
    components: [nice_bidiwifi]
    refresh: Always

logger:
  level: VERY_VERBOSE

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  # v3 layout avoids table/log overlap seen with v2 in some browsers; set log: false to hide the panel
  version: 3

# Nice BiDi-WiFi hub (T4 bus communication)
nice_bidiwifi:
  id: my_gate
  uart_rx_pin: 18
  uart_tx_pin: 21
  # hub_address: 0x5090  # default, change only if needed

# Gate cover entity
cover:
  - platform: nice_bidiwifi
    name: "Gate"
    device_class: gate
    id: gate
    auto_learn_timing: true
    open_duration: 20s
    close_duration: 20s
    position_report_interval: 500ms
    # Set true if HA open/close matches the wrong physical direction (common on swing gates).
    # invert_open_close: true
    # If HA still greys out Open or Close, set false (no slider; buttons use state only).
    # supports_position: false

# Control buttons
button:
  - platform: nice_bidiwifi
    name: "Step by Step"
    command: sbs

  # Dual leaf (one CLB / IBT-style CU, M1+M2): host vs slave DEP commands.
  # Rename in HA if your pedestrian leaf is wired the other way.
  - platform: nice_bidiwifi
    name: "Master leaf open"
    command: master_open
  - platform: nice_bidiwifi
    name: "Master leaf close"
    command: master_close
  - platform: nice_bidiwifi
    name: "Slave leaf open"
    command: slave_open
  - platform: nice_bidiwifi
    name: "Slave leaf close"
    command: slave_close
  - platform: nice_bidiwifi
    name: "Master leaf step"
    command: master_sbs
  - platform: nice_bidiwifi
    name: "Slave leaf step"
    command: slave_sbs

  - platform: nice_bidiwifi
    name: "Partial Open 1"
    command: partial_open_1

  - platform: nice_bidiwifi
    name: "Lock"
    command: lock

  - platform: nice_bidiwifi
    name: "Unlock"
    command: unlock

  - platform: nice_bidiwifi
    name: "Light Toggle"
    command: light_toggle

# Feature switches
switch:
  - platform: nice_bidiwifi
    auto_close:
      name: "Auto Close"
    photo_close:
      name: "Close After Photo"
    always_close:
      name: "Always Close"
    standby:
      name: "Standby"
    pre_flash:
      name: "Pre-Flash Warning"
    key_lock:
      name: "Key Lock"

# Sensors
sensor:
  - platform: nice_bidiwifi
    position:
      name: "Gate Position"
    encoder_value:
      name: "Encoder Raw"
    maneuver_count:
      name: "Total Maneuvers"
    maintenance_count:
      name: "Maintenance Counter"
    maintenance_threshold:
      name: "Maintenance Threshold"

# Info text sensors
text_sensor:
  - platform: nice_bidiwifi
    product:
      name: "Product"
    firmware_version:
      name: "Firmware"
    hardware_version:
      name: "Hardware"
    gate_status:
      name: "Status"
    manufacturer:
      name: "Manufacturer"
    last_stop_reason:
      name: "Last Stop Reason"
    diagnostic_parameters:
      name: "Diagnostic Parameters"

# Diagnostics
binary_sensor:
  - platform: nice_bidiwifi
    photocell:
      name: "Photocell"
    limit_switch_open:
      name: "Limit Open"
    limit_switch_close:
      name: "Limit Close"
    obstacle:
      name: "Obstacle Detected"
    locked:
      name: "Gate Locked"
    input_1:
      name: "Logic Input 1"
    input_2:
      name: "Logic Input 2"
    input_3:
      name: "Logic Input 3"
    input_4:
      name: "Logic Input 4"

# Configuration numbers (raw register bytes on the bus).
# Motor force/speed also have template selects below with manual L1–L8 / speed labels (karol27 / Nice manual style).
number:
  - platform: nice_bidiwifi
    pause_time:
      name: "Pause Time"
    opening_force:
      id: nf_opening_force
      name: "Opening Force (raw)"
      internal: true
    closing_force:
      id: nf_closing_force
      name: "Closing Force (raw)"
      internal: true
    opening_speed:
      id: nf_opening_speed
      name: "Opening Speed (raw)"
      internal: true
    closing_speed:
      id: nf_closing_speed
      name: "Closing Speed (raw)"
      internal: true
    photo_close_time:
      name: "Photo Close Time"
    photo_close_mode:
      name: "Photo Close Mode"
    always_close_time:
      name: "Always Close Time"
    always_close_mode:
      name: "Always Close Mode"

# Manual-aligned labels:
# - Aria (EN) Nice Home Aria PDF, §8.1.1.1 Table 4 — Motor force "Value" column lists exactly: Low | Medium-low *
#   (see extracted text; additional Bus-T4 encodings are not named there).
# - nice_dmbm_integration_protocol.pdf: no per-tier force/speed names; position uses "A value between 0 and 100" (different function).
# Speed: Aria uses "slow" / "fast" (e.g. §4 programming); intermediate tiers are Bus-T4 payload only — labelled with the numeric byte.
select:
  - platform: template
    name: "L2 L5 — Force open"
    id: motor_force_open_select
    update_interval: 2s
    options:
      - "Low"
      - "Medium-low *"
      - "Motor force — raw 2"
      - "Motor force — raw 3"
      - "Motor force — raw 4"
      - "Motor force — raw 7"
      - "Motor force — raw 16"
      - "Motor force — raw 18"
      - "other"
    lambda: |-
      if (!id(nf_opening_force).has_state())
        return std::string("other");
      switch ((int) id(nf_opening_force).state) {
        case 1: return std::string("Low");
        case 17: return std::string("Medium-low *");
        case 2: return std::string("Motor force — raw 2");
        case 3: return std::string("Motor force — raw 3");
        case 4: return std::string("Motor force — raw 4");
        case 7: return std::string("Motor force — raw 7");
        case 16: return std::string("Motor force — raw 16");
        case 18: return std::string("Motor force — raw 18");
        default: return std::string("other");
      }
    set_action:
      then:
        - lambda: |-
            if (x == "other") return;
            int v = 1;
            if (x == "Low") v = 1;
            else if (x == "Medium-low *") v = 17;
            else if (x == "Motor force — raw 2") v = 2;
            else if (x == "Motor force — raw 3") v = 3;
            else if (x == "Motor force — raw 4") v = 4;
            else if (x == "Motor force — raw 7") v = 7;
            else if (x == "Motor force — raw 16") v = 16;
            else if (x == "Motor force — raw 18") v = 18;
            id(nf_opening_force).make_call().set_value((float) v).perform();

  - platform: template
    name: "L2 L5 — Force close"
    id: motor_force_close_select
    update_interval: 2s
    options:
      - "Low"
      - "Medium-low *"
      - "Motor force — raw 2"
      - "Motor force — raw 3"
      - "Motor force — raw 4"
      - "Motor force — raw 7"
      - "Motor force — raw 16"
      - "Motor force — raw 18"
      - "other"
    lambda: |-
      if (!id(nf_closing_force).has_state())
        return std::string("other");
      switch ((int) id(nf_closing_force).state) {
        case 1: return std::string("Low");
        case 17: return std::string("Medium-low *");
        case 2: return std::string("Motor force — raw 2");
        case 3: return std::string("Motor force — raw 3");
        case 4: return std::string("Motor force — raw 4");
        case 7: return std::string("Motor force — raw 7");
        case 16: return std::string("Motor force — raw 16");
        case 18: return std::string("Motor force — raw 18");
        default: return std::string("other");
      }
    set_action:
      then:
        - lambda: |-
            if (x == "other") return;
            int v = 1;
            if (x == "Low") v = 1;
            else if (x == "Medium-low *") v = 17;
            else if (x == "Motor force — raw 2") v = 2;
            else if (x == "Motor force — raw 3") v = 3;
            else if (x == "Motor force — raw 4") v = 4;
            else if (x == "Motor force — raw 7") v = 7;
            else if (x == "Motor force — raw 16") v = 16;
            else if (x == "Motor force — raw 18") v = 18;
            id(nf_closing_force).make_call().set_value((float) v).perform();

  - platform: template
    name: "L2 L3 — Open speed"
    id: motor_speed_open_select
    update_interval: 2s
    options:
      - "slow"
      - "Movement speed — 35"
      - "Movement speed — 45"
      - "Movement speed — 60"
      - "Movement speed — 80"
      - "fast"
      - "other"
    lambda: |-
      if (!id(nf_opening_speed).has_state())
        return std::string("other");
      switch ((int) id(nf_opening_speed).state) {
        case 27: return std::string("slow");
        case 35: return std::string("Movement speed — 35");
        case 45: return std::string("Movement speed — 45");
        case 60: return std::string("Movement speed — 60");
        case 80: return std::string("Movement speed — 80");
        case 100: return std::string("fast");
        default: return std::string("other");
      }
    set_action:
      then:
        - lambda: |-
            if (x == "other") return;
            int v = 27;
            if (x == "slow") v = 27;
            else if (x == "Movement speed — 35") v = 35;
            else if (x == "Movement speed — 45") v = 45;
            else if (x == "Movement speed — 60") v = 60;
            else if (x == "Movement speed — 80") v = 80;
            else if (x == "fast") v = 100;
            id(nf_opening_speed).make_call().set_value((float) v).perform();

  - platform: template
    name: "L2 L3 — Close speed"
    id: motor_speed_close_select
    update_interval: 2s
    options:
      - "slow"
      - "Movement speed — 35"
      - "Movement speed — 45"
      - "Movement speed — 60"
      - "Movement speed — 80"
      - "fast"
      - "other"
    lambda: |-
      if (!id(nf_closing_speed).has_state())
        return std::string("other");
      switch ((int) id(nf_closing_speed).state) {
        case 27: return std::string("slow");
        case 35: return std::string("Movement speed — 35");
        case 45: return std::string("Movement speed — 45");
        case 60: return std::string("Movement speed — 60");
        case 80: return std::string("Movement speed — 80");
        case 100: return std::string("fast");
        default: return std::string("other");
      }
    set_action:
      then:
        - lambda: |-
            if (x == "other") return;
            int v = 27;
            if (x == "slow") v = 27;
            else if (x == "Movement speed — 35") v = 35;
            else if (x == "Movement speed — 45") v = 45;
            else if (x == "Movement speed — 60") v = 60;
            else if (x == "Movement speed — 80") v = 80;
            else if (x == "fast") v = 100;
            id(nf_closing_speed).make_call().set_value((float) v).perform();

# Bus debugging: paste hex (e.g. 55.0C... or 550C00FF); hub strips spaces/dots.
text:
  - platform: template
    name: "Raw T4 hex"
    id: raw_t4_hex
    optimistic: true
    mode: text
    on_value:
      then:
        - lambda: |-
            if (!x.empty()) {
              id(my_gate).send_raw_cmd(x);
            }
