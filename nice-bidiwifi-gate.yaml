esphome:
  name: nice-gate
  friendly_name: "Nice Gate"

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: https://github.com/ngem1/esphome-nice-bidiwifi
      ref: main  # pin a branch (e.g. cover-invert-num-fix) or use local: source: components
    components: [nice_bidiwifi]
    refresh: Always

logger:
  level: VERY_VERBOSE

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  # v3 layout avoids table/log overlap seen with v2 in some browsers; set log: false to hide the panel
  version: 3

# Nice BiDi-WiFi hub (T4 bus communication)
nice_bidiwifi:
  id: my_gate
  uart_rx_pin: 18
  uart_tx_pin: 21
  # hub_address: 0x5090  # default, change only if needed

# Gate cover entity
cover:
  - platform: nice_bidiwifi
    name: "Gate"
    device_class: gate
    id: gate
    auto_learn_timing: true
    open_duration: 20s
    close_duration: 20s
    position_report_interval: 500ms
    # Set true if HA open/close matches the wrong physical direction (common on swing gates).
    # invert_open_close: true
    # If HA still greys out Open or Close, set false (no slider; buttons use state only).
    # supports_position: false

# Control buttons
button:
  - platform: nice_bidiwifi
    name: "Step by Step"
    command: sbs

  # Dual leaf (one CLB / IBT-style CU, M1+M2): host vs slave DEP commands.
  # Rename in HA if your pedestrian leaf is wired the other way.
  - platform: nice_bidiwifi
    name: "Master leaf open"
    command: master_open
  - platform: nice_bidiwifi
    name: "Master leaf close"
    command: master_close
  - platform: nice_bidiwifi
    name: "Slave leaf open"
    command: slave_open
  - platform: nice_bidiwifi
    name: "Slave leaf close"
    command: slave_close
  - platform: nice_bidiwifi
    name: "Master leaf step"
    command: master_sbs
  - platform: nice_bidiwifi
    name: "Slave leaf step"
    command: slave_sbs

  - platform: nice_bidiwifi
    name: "Partial Open 1"
    command: partial_open_1

  - platform: nice_bidiwifi
    name: "Lock"
    command: lock

  - platform: nice_bidiwifi
    name: "Unlock"
    command: unlock

  - platform: nice_bidiwifi
    name: "Light Toggle"
    command: light_toggle

# Feature switches
switch:
  - platform: nice_bidiwifi
    auto_close:
      name: "Auto Close"
    photo_close:
      name: "Close After Photo"
    always_close:
      name: "Always Close"
    standby:
      name: "Standby"
    pre_flash:
      name: "Pre-Flash Warning"
    key_lock:
      name: "Key Lock"

# Sensors
sensor:
  - platform: nice_bidiwifi
    position:
      name: "Gate Position"
    encoder_value:
      name: "Encoder Raw"
    maneuver_count:
      name: "Total Maneuvers"
    maintenance_count:
      name: "Maintenance Counter"
    maintenance_threshold:
      name: "Maintenance Threshold"

# Info text sensors
text_sensor:
  - platform: nice_bidiwifi
    product:
      name: "Product"
    firmware_version:
      name: "Firmware"
    hardware_version:
      name: "Hardware"
    gate_status:
      name: "Status"
    manufacturer:
      name: "Manufacturer"
    last_stop_reason:
      name: "Last Stop Reason"
    diagnostic_parameters:
      name: "Diagnostic Parameters"

# Diagnostics
binary_sensor:
  - platform: nice_bidiwifi
    photocell:
      name: "Photocell"
    limit_switch_open:
      name: "Limit Open"
    limit_switch_close:
      name: "Limit Close"
    obstacle:
      name: "Obstacle Detected"
    locked:
      name: "Gate Locked"
    input_1:
      name: "Logic Input 1"
    input_2:
      name: "Logic Input 2"
    input_3:
      name: "Logic Input 3"
    input_4:
      name: "Logic Input 4"

# Configuration numbers
number:
  - platform: nice_bidiwifi
    pause_time:
      name: "Pause Time"
    opening_force:
      name: "Opening Force"
    closing_force:
      name: "Closing Force"
    opening_speed:
      name: "Opening Speed"
    closing_speed:
      name: "Closing Speed"
    photo_close_time:
      name: "Photo Close Time"
    photo_close_mode:
      name: "Photo Close Mode"
    always_close_time:
      name: "Always Close Time"
    always_close_mode:
      name: "Always Close Mode"

# Bus debugging: paste hex (e.g. 55.0C... or 550C00FF); hub strips spaces/dots.
text:
  - platform: template
    name: "Raw T4 hex"
    id: raw_t4_hex
    optimistic: true
    mode: text
    on_value:
      then:
        - lambda: |-
            if (!x.empty()) {
              id(my_gate).send_raw_cmd(x);
            }
